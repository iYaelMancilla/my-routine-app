<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Rutina</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

  <div class="top">
    <h1> My Routine App</h1>
    <div class="clock" id="clock"></div>
    <div id="currentClass"></div>
  </div>

  <div class="grid">

    <!-- TAREAS -->
    <div class="card">
      <h2 id="dayTitle">Tareas del día</h2>

      <input id="taskTitle" placeholder="Título">
      <input id="taskDesc" placeholder="Descripción">

      <div class="row">
        <input type="file" id="taskImage" accept="image/*">
        <button onclick="addTask()">Agregar</button>
      </div>

      <ul id="taskList"></ul>
    </div>

    <!-- CALENDARIO -->
    <div class="card">
      <h2>Calendario</h2>
      <div id="calendar" class="calendar"></div>
    </div>

    <!-- RUTINA DIARIA -->
    <div class="card">
      <h2>Rutina diaria</h2>

      <input id="routineTitle" placeholder="Actividad (ej: Leer)">
      <input id="routineTime" type="time">
      <input id="routineDuration" type="number" placeholder="Duración (minutos)">

      <button onclick="addRoutine()">Agregar rutina</button>

      <ul id="routineList"></ul>
    </div>

    <!-- 🎓 UNIVERSIDAD (NUEVO) -->
    <div class="card">
      <h2>🎓 Universidad</h2>

      <!-- agregar materia -->
      <input id="subjectName" placeholder="Materia (ej: Cálculo)">

      <!-- día -->
      <select id="subjectDay">
        <option value="1">Lunes</option>
        <option value="2">Martes</option>
        <option value="3">Miércoles</option>
        <option value="4">Jueves</option>
        <option value="5">Viernes</option>
        <option value="6">Sábado</option>
        <option value="0">Domingo</option>
      </select>

      <!-- horario -->
      <input id="subjectStart" type="time">
      <input id="subjectEnd" type="time">

      <button onclick="addSubject()">Agregar materia</button>

      <!-- lista -->
      <ul id="subjectList"></ul>
    </div>

  </div>

</div>

<!-- JS -->
<script src="script.js" defer></script>

</body>
</html>
